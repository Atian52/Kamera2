<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Camera Node - With Preview</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .container { background: #222; padding: 20px; border-radius: 15px; border: 1px solid #444; max-width: 500px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; transform: scaleX(-1); } /* Mirror preview */
        .badge { background: #444; padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #aaa; }
        #status { font-weight: bold; margin: 15px 0; color: #00ff00; }
        .live-tag { color: red; font-size: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h3>CCTV NODE</h3>
        <span class="badge" id="my-id-display">Memuat ID...</span>
        <div id="status">Standby</div>
        <div id="live-tag" class="live-tag">● LIVE STREAMING</div>
        
        <video id="local-preview" autoplay playsinline muted></video>
        <p style="font-size: 11px; color: #666;">Preview di atas hanya untuk memastikan kamera aktif.</p>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // --- CONFIG ---
        const MY_CAMERA_ID = 'cam-01'; // Tentukan ID unik di sini
        const MONITOR_ID = 'monitor-cctv-pusat-2026';
        const VALID_USER = "admin";
        const VALID_PASS = "12345";
        // --------------

        document.getElementById('my-id-display').innerText = "ID KAMERA: " + MY_CAMERA_ID;
        const statusText = document.getElementById('status');
        const liveTag = document.getElementById('live-tag');
        const preview = document.getElementById('local-preview');
        
        let peer = new Peer(MY_CAMERA_ID);
        let localStream = null;

        // Langsung tampilkan preview kamera saat halaman dibuka
        window.onload = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                preview.srcObject = localStream;
            } catch (e) {
                statusText.innerText = "Error: Kamera tidak diizinkan!";
                statusText.style.color = "red";
            }
        };

        peer.on('open', () => {
            statusText.innerText = "Siap Digunakan (Standby)";
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.user === VALID_USER && data.pass === VALID_PASS) {
                    if (data.command === 'start-camera') {
                        peer.call(MONITOR_ID, localStream);
                        statusText.innerText = "Terhubung ke Monitor";
                        liveTag.style.display = "block";
                    }
                    if (data.command === 'stop-camera') {
                        statusText.innerText = "Standby (Monitor Berhenti)";
                        liveTag.style.display = "none";
                    }
                }
            });
        });
    </script>
</body>
</html>
